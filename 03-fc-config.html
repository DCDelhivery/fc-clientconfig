<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delhivery WMS - FC Configuration</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    :root{--primary:#E31E24;--primary-light:#FDE8E9;--surface:#FFFFFF;--bg:#FFFFFF;--border:#E0E0E0;--border-light:#F0F0F0;--t1:#1A1A1A;--t2:#666666;--t3:#999999;--success:#0D7A3F;--success-bg:#E6F5ED;--warning:#D97706;--warning-bg:#FEF3E2;--radius:8px;--radius-sm:4px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;flex-direction:column;animation:slideInFromRight 0.3s ease;}
    @keyframes slideInFromRight{from{transform:translateX(100%)}to{transform:translateX(0)}}

    /* Header */
    .header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 104px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
    .header-left h1{font-size:20px;font-weight:600;margin-bottom:4px;}
    .header-left .subtitle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);}
    .header-left .subtitle .pill{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;background:var(--warning-bg);color:var(--warning);}
    .header-right{display:flex;align-items:center;gap:12px;}
    .btn-draft{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;font-size:13px;font-weight:500;color:var(--t1);cursor:pointer;transition:all .15s;}
    .btn-draft:disabled{color:var(--t3);border-color:var(--border-light);cursor:not-allowed;background:var(--surface);}
    .btn-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;color:var(--t2);}

    /* Layout */
    .layout{display:flex;flex:1;overflow:hidden;padding:0 104px;}
    .left-nav{width:200px;padding:24px 0;border-right:1px solid var(--border-light);flex-shrink:0;overflow-y:auto;}
    .nav-title{font-size:13px;font-weight:600;color:var(--t1);padding:0 12px;margin-bottom:10px;}
    .nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;}
    .nav-item:hover{background:#F5F5F7;}
    .nav-item .material-icons-outlined{font-size:16px;color:var(--success);}
    .nav-divider{height:1px;background:var(--border-light);margin:14px 12px;}
    .fc-item{padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;}
    .fc-item:hover{background:#F5F5F7;}
    .fc-item.active{background:#F5F5F7;font-weight:600;color:var(--t1);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    /* Top Stepper */
    .top-stepper{display:flex;align-items:flex-start;padding:20px 32px;border-bottom:1px solid var(--border-light);flex-shrink:0;gap:0;margin-right:-32px;padding-right:32px;}
    .step-item{display:flex;align-items:flex-start;gap:8px;padding:0;border:none;border-radius:0;cursor:pointer;background:none;}
    .step-item .step-num{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;margin-top:1px;}
    .step-item.active .step-num{border-color:var(--t1);color:var(--t1);}
    .step-item.completed .step-num{border-color:var(--success);background:var(--success);color:#fff;}
    .step-item .step-info{display:flex;flex-direction:column;}
    .step-item .step-label{font-size:12px;font-weight:600;color:var(--t3);}
    .step-item.active .step-label{color:var(--t1);}
    .step-item.completed .step-label{color:var(--success);}
    .step-item .step-desc{font-size:10px;color:var(--t3);margin-top:1px;}
    .step-line{flex:1;height:2px;background:var(--border-light);margin:12px 16px 0;}
    .step-line.done{background:var(--success);}

    /* Content Area */
    .content{flex:1;overflow-y:auto;padding:28px 32px 100px;}
    .content-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0;padding:16px;border-bottom:1px solid var(--border-light);}
    .content-title{font-size:18px;font-weight:600;}
    .content-subtitle{font-size:12px;color:var(--t3);margin-top:2px;}
    .content-count{font-size:12px;color:var(--t3);}

    /* Section Divider */
    .section-divider{margin:0;padding:16px;background:transparent;border-left:none;border-radius:0;border-bottom:none;position:relative;}
    .section-divider:after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:1px;background:var(--border-light);}
    .section-divider.no-divider:after{display:none;}
    .section-divider-title{font-size:14px;font-weight:700;color:var(--t1);}
    .section-divider-desc{font-size:12px;color:var(--t3);margin-top:2px;}

    /* Config Row */
    .cfg-row{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 16px 16px 38px;border-bottom:none;position:relative;}
    .cfg-row:after{content:'';position:absolute;bottom:0;left:38px;right:16px;height:1px;background:var(--border-light);}
    .cfg-row:last-child:after{display:none;}
    .cfg-row-left{flex:1;max-width:65%;}
    .cfg-row-right{display:flex;align-items:center;justify-content:flex-end;min-width:160px;}
    .cfg-label{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;}
    .cfg-desc{font-size:12px;color:var(--t3);line-height:1.4;margin-bottom:6px;}
    .cfg-badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;}
    .badge-fc{background:#E6F0FA;color:#0066CC;}
    .badge-client{background:#E6F0FA;color:#0066CC;}

    /* Sub-reveal */
    .cfg-reveal{margin:8px 0 0;padding:12px 16px;background:#FAFAFA;border-radius:var(--radius-sm);display:none;}
    .cfg-reveal.show{display:flex;align-items:center;justify-content:space-between;}
    .cfg-reveal-block.show{display:block;}
    .cfg-reveal-label{font-size:12px;color:var(--t2);}
    .cfg-warn{font-size:11px;color:#B45309;font-weight:500;margin-top:6px;}

    /* Segmented Btn */
    .seg-group{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
    .seg-btn{padding:6px 14px;font-family:inherit;font-size:12px;font-weight:500;border:none;background:var(--surface);color:var(--t2);cursor:pointer;}
    .seg-btn+.seg-btn{border-left:1px solid var(--border);}
    .seg-btn.active{background:#F5F5F7;color:var(--t1);font-weight:600;}
    .seg-btn:hover:not(.active){background:#FAFAFA;}

    /* Inputs & Selects */
    .tds-input{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:12px;color:var(--t1);background:#fff;width:150px;}
    .tds-input:focus{outline:none;border-color:var(--t1);}
    .tds-input::placeholder{color:#C0C0C0;}
    .tds-select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:12px;color:var(--t1);background:#fff;min-width:160px;cursor:pointer;}
    .tds-select:focus{outline:none;border-color:var(--t1);}

    /* Pills */
    .pill-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#F0F1F3;border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:500;color:var(--t1);}
    .pill-chip .remove{font-size:13px;color:var(--t3);cursor:pointer;}
    .pill-chip .remove:hover{color:var(--primary);}
    .add-link{font-size:12px;font-weight:500;color:#0066CC;cursor:pointer;margin-top:4px;}
    .info-wrap:hover .info-tip{opacity:1!important;}

    /* TDS Tooltip - using native title attr, no custom CSS needed */

    /* Zones Table */
    .zones-wrap{border:1px solid var(--border-light);border-radius:var(--radius);overflow:visible;}
    .zones-table{width:100%;border-collapse:collapse;}
    .zones-table thead{background:#F9FAFB;}
    .zones-table th{padding:10px 16px;font-size:11px;font-weight:600;color:var(--t2);text-align:left;border-bottom:1px solid var(--border);}
    .zones-table td{padding:10px 16px;font-size:12px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
    .zones-table tbody tr:last-child td{border-bottom:none;}
    .zone-input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:12px;color:var(--t1);width:100%;background:#fff;}
    .zone-input:focus{outline:none;border-color:var(--t1);}
    .zone-input::placeholder{color:#C0C0C0;}
    .zone-pill{display:inline-flex;padding:3px 8px;background:#F0F4F8;border:1px solid #E2E8F0;border-radius:4px;font-size:10px;font-weight:500;color:#475569;}
    .zone-save-btn{padding:4px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-family:inherit;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;}
    .zone-save-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .zone-edit-btn{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:pointer;color:var(--t3);}
    .btn-bulk{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-family:inherit;font-size:11px;font-weight:500;color:var(--t1);cursor:pointer;}

    /* Rejection Dropdown */
    .rej-trigger{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--t3);cursor:pointer;min-width:160px;justify-content:space-between;background:#fff;}
    .rej-dd{display:none;position:absolute;top:100%;right:0;min-width:220px;background:#fff;border:1px solid var(--border);border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:200;max-height:180px;overflow-y:auto;}
    .rej-dd.open{display:block;}
    .rej-opt{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;font-size:12px;cursor:pointer;}
    .rej-opt:hover{background:#F5F5F7;}

    /* Footer */
    .footer{display:flex;align-items:center;justify-content:flex-end;padding:12px 136px;border-top:1px solid var(--border-light);gap:12px;flex-shrink:0;background:#fff;}
    .btn-back{padding:8px 20px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;}
    .btn-back:hover{color:var(--t2);}
    .btn-continue{padding:8px 24px;border:none;border-radius:var(--radius-sm);background:var(--t1);font-family:inherit;font-size:13px;font-weight:500;color:#fff;cursor:pointer;}
    .btn-continue:hover{background:#333;}
    .btn-continue:disabled{background:#E0E0E0;color:#999;cursor:not-allowed;}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 id="fcClientNameHeader">Mamaearth Ltd</h1>
      <div class="subtitle">Client & FC configuration <span class="pill">Draft</span></div>
    </div>
    <div class="header-right">
      <button class="btn-draft" id="btnSaveDraft" onclick="saveDraft()">Save as draft</button>
      <button class="btn-close" onclick="window.location.href='01-client-list.html'"><span class="material-icons-outlined" style="font-size:18px;">close</span></button>
    </div>
  </header>

  <div class="layout">
    <nav class="left-nav">
      <div class="nav-title">Client mappings</div>
      <div class="nav-item" onclick="window.location.href='02-courier-setup.html'"><span>Courier mapping</span><span class="material-icons-outlined">check_circle</span></div>
      <div class="nav-item" onclick="window.location.href='02-courier-setup.html'"><span>Channel mapping</span><span class="material-icons-outlined">check_circle</span></div>
      <div class="nav-item" onclick="window.location.href='02-courier-setup.html'"><span>FC mapping</span><span class="material-icons-outlined">check_circle</span></div>
      <div class="nav-divider"></div>
      <div class="nav-title">FC configuration</div>
      <div id="fcNavList"></div>
    </nav>

    <div class="main">
      <!-- Top Stepper -->
      <div class="top-stepper" id="topStepper"></div>
      <!-- Scrollable Content -->
      <div class="content" id="contentArea"></div>
    </div>
  </div>

  <footer class="footer">
    <button class="btn-back" id="btnBack" onclick="goBack()">Previous</button>
    <button class="btn-continue" id="btnContinue" onclick="goNext()">Save & proceed</button>
  </footer>

  <script>
    // Set client name
    const fcClientName = localStorage.getItem('activeClient') || 'Mamaearth Ltd';
    document.getElementById('fcClientNameHeader').textContent = fcClientName;

    const selectedFCs = JSON.parse(localStorage.getItem('selectedFCs')||'["GGNFC14","GGNFC12"]');
    const steps = [
      {id:'inbound', label:'Inbound', desc:'Receiving, QC'},
      {id:'inventory', label:'Inventory', desc:'Zones, expiry, cycle count'},
      {id:'outbound', label:'Outbound', desc:'Allocation, picking, dispatch'}
    ];
    let activeFC = selectedFCs[0];
    let activeStep = 'inbound';
    const saved = JSON.parse(sessionStorage.getItem('fcSaved')||'{}');

    // FC Nav
    const configuredFCs = JSON.parse(sessionStorage.getItem('configuredFCs')||'{}');
    function renderFCNav(){
      document.getElementById('fcNavList').innerHTML = selectedFCs.map(fc => {
        const isConfigured = configuredFCs[fc];
        const isOpen = fc === activeFC;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:4px;font-size:12px;font-weight:${isOpen?'600':'500'};color:${isOpen?'var(--t1)':'var(--t2)'};cursor:pointer;${isOpen?'background:#F5F5F7;':''}" onclick="selectFC('${fc}')">
          <span>${fc}</span>
          ${isConfigured?'<span class="material-icons-outlined" style="font-size:16px;color:var(--success);">check_circle</span>':''}
        </div>`;
      }).join('');
    }
    function selectFC(fc){
      if(fc !== activeFC && !configuredFCs[fc]){
        // Show clone prompt for unconfigured FC
        showClonePrompt(fc);
        return;
      }
      activeFC=fc;activeStep='inbound';renderAll();
    }
    function markFCConfigured(fc){
      configuredFCs[fc]=true;
      sessionStorage.setItem('configuredFCs',JSON.stringify(configuredFCs));
    }

    function showClonePrompt(fc){
      const existing=document.getElementById('cloneModal');if(existing)existing.remove();
      const configuredList=selectedFCs.filter(f=>configuredFCs[f]);
      const modal=document.createElement('div');modal.id='cloneModal';
      modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:500;';
      modal.innerHTML=`<div style="background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.15);width:420px;max-width:90vw;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-light);">
          <h3 style="font-size:15px;font-weight:600;">Configure ${fc}</h3>
          <button onclick="document.getElementById('cloneModal').remove()" style="border:none;background:none;cursor:pointer;color:var(--t3);"><span class="material-icons-outlined" style="font-size:18px;">close</span></button>
        </div>
        <div style="padding:24px;">
          <div style="font-size:13px;color:var(--t2);margin-bottom:16px;">Would you like to clone configuration from an existing FC?</div>
          <div style="font-size:12px;font-weight:500;margin-bottom:6px;">Clone from <span style="color:var(--primary);">*</span></div>
          <select class="tds-select" id="cloneSource" style="width:100%;">
            <option value="">Select FC to clone from</option>
            ${selectedFCs.filter(f=>f!==fc).map(f=>`<option value="${f}">${f}${configuredFCs[f]?' (configured)':''}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--border-light);">
          <button onclick="startFreshFC('${fc}')" style="padding:7px 16px;border:1px solid var(--border);border-radius:4px;background:#fff;font-family:inherit;font-size:12px;font-weight:500;color:var(--t1);cursor:pointer;">Start fresh</button>
          <button onclick="cloneFC('${fc}')" style="padding:7px 16px;border:none;border-radius:4px;background:var(--t1);font-family:inherit;font-size:12px;font-weight:500;color:#fff;cursor:pointer;">Clone & configure</button>
        </div>
      </div>`;
      document.body.appendChild(modal);
    }
    function startFreshFC(fc){
      document.getElementById('cloneModal').remove();
      activeFC=fc;activeStep='inbound';renderAll();
    }
    function cloneFC(fc){
      const source=document.getElementById('cloneSource').value;
      document.getElementById('cloneModal').remove();
      // Copy all settings from source FC to new FC
      const st = JSON.parse(sessionStorage.getItem('allConfigState')||'{}');
      ['inbound','inventory','outbound'].forEach(step=>{
        if(st[`${source}-${step}`]){
          st[`${fc}-${step}`] = JSON.parse(JSON.stringify(st[`${source}-${step}`]));
        }
      });
      sessionStorage.setItem('allConfigState', JSON.stringify(st));
      // Also mark steps as saved
      saved[`${fc}-inbound`]=true;saved[`${fc}-inventory`]=true;
      sessionStorage.setItem('fcSaved',JSON.stringify(saved));
      activeFC=fc;activeStep='inbound';renderAll();restoreState();
    }

    // Stepper
    function renderStepper(){
      const stepIdx = steps.findIndex(s=>s.id===activeStep);
      document.getElementById('topStepper').innerHTML = steps.map((s,i)=>{
        let cls='';
        if(s.id===activeStep)cls='active';
        else if(saved[`${activeFC}-${s.id}`])cls='completed';
        const line = i>0?`<div class="step-line ${saved[`${activeFC}-${steps[i-1].id}`]?'done':''}"></div>`:'';
        return `${line}<div class="step-item ${cls}" onclick="goToStep('${s.id}')">
          <div class="step-num">${cls==='completed'?'<span class="material-icons-outlined" style="font-size:12px">check</span>':(i+1)}</div>
          <div class="step-info"><span class="step-label">${s.label}</span><span class="step-desc">${s.desc}</span></div>
        </div>`;
      }).join('');
    }
    function goToStep(id){activeStep=id;renderAll();}
    function goBack(){const idx=steps.findIndex(s=>s.id===activeStep);if(idx>0){activeStep=steps[idx-1].id;renderAll();}}
    function goNext(){
      if(activeStep==='outbound'){showReviewModal();return;}
      saved[`${activeFC}-${activeStep}`]=true;sessionStorage.setItem('fcSaved',JSON.stringify(saved));
      const idx=steps.findIndex(s=>s.id===activeStep);if(idx<steps.length-1){activeStep=steps[idx+1].id;}renderAll();
    }

    // Content
    function renderContent(){
      const area = document.getElementById('contentArea');
      if(activeStep==='inbound') { area.innerHTML = getInboundPage(); setTimeout(()=>{renderRejChips();renderQcInstrChips();},50); }
      else if(activeStep==='inventory') { area.innerHTML = getInventoryPage(); }
      else { area.innerHTML = getOutboundPage(); setTimeout(()=>renderPackChips(),50); }
    }

    function renderAll(){renderFCNav();renderStepper();renderContent();updateFooter();}
    function updateFooter(){
      const btn=document.getElementById('btnContinue');if(!btn)return;
      const backBtn=document.getElementById('btnBack');if(!backBtn)return;
      if(activeStep==='outbound'){btn.textContent='Review';}
      else{btn.textContent='Save & proceed';}
      // Previous button: disabled on inbound, enabled on inventory/outbound
      if(activeStep==='inbound'){
        backBtn.style.color='var(--t3)';backBtn.style.cursor='not-allowed';backBtn.disabled=true;
      } else {
        backBtn.style.color='var(--t2)';backBtn.style.cursor='pointer';backBtn.disabled=false;
      }
      // Save & proceed: check if all toggles on current page have been clicked
      checkAllSettingsFilled();
    }
    function checkAllSettingsFilled(){
      const btn=document.getElementById('btnContinue');if(!btn)return;
      const segs=document.querySelectorAll('#contentArea .seg-group');
      let allFilled=true;
      segs.forEach(seg=>{
        if(!seg.querySelector('.seg-btn.active'))allFilled=false;
      });
      if(allFilled && segs.length>0){
        btn.style.background='var(--t1)';btn.style.color='#fff';btn.style.cursor='pointer';btn.disabled=false;
      } else {
        btn.style.background='var(--border)';btn.style.color='var(--t3)';btn.style.cursor='not-allowed';btn.disabled=true;
      }
    }
    // Listen for toggle clicks to re-check
    document.addEventListener('click',function(e){
      if(e.target.classList.contains('seg-btn')){setTimeout(checkAllSettingsFilled,50);}
    });

    // ===== STATE PERSISTENCE =====
    // Store all toggle/input states per FC+step so they persist when navigating
    const allState = JSON.parse(sessionStorage.getItem('allConfigState')||'{}');
    function saveAllState(){
      const key = `${activeFC}-${activeStep}`;
      const state = {};
      // Save all seg-group states
      document.querySelectorAll('#contentArea .seg-group').forEach((g,i)=>{
        const active = g.querySelector('.seg-btn.active');
        state[`seg_${i}`] = active ? active.textContent : '';
      });
      // Save all inputs (text, number)
      document.querySelectorAll('#contentArea .tds-input, #contentArea .zone-input').forEach((inp,i)=>{
        state[`inp_${i}`] = inp.value;
      });
      // Save all selects
      document.querySelectorAll('#contentArea .tds-select, #contentArea select').forEach((sel,i)=>{
        state[`sel_${i}`] = sel.value;
      });
      // Save rejection reasons and QC instructions
      state.rejReasons = JSON.stringify(rejReasons);
      state.qcInstr = JSON.stringify(qcInstr);
      // Save packInstr for outbound
      state.packInstr = JSON.stringify(packInstr);
      allState[key] = state;
      sessionStorage.setItem('allConfigState', JSON.stringify(allState));
    }
    function restoreState(){
      const key = `${activeFC}-${activeStep}`;
      const state = allState[key];
      if(!state) return;
      setTimeout(()=>{
        // Restore seg-groups (toggles)
        document.querySelectorAll('#contentArea .seg-group').forEach((g,i)=>{
          const val = state[`seg_${i}`];
          if(val){
            g.querySelectorAll('.seg-btn').forEach(b=>{b.classList.remove('active');if(b.textContent===val)b.classList.add('active');});
          }
        });
        // Trigger Yes buttons to show reveals (after a small delay)
        setTimeout(()=>{
          document.querySelectorAll('#contentArea .seg-group').forEach((g,i)=>{
            const val = state[`seg_${i}`];
            if(val==='Yes'){
              const yesBtn = g.querySelector('.seg-btn:first-child');
              if(yesBtn && yesBtn.classList.contains('active') && yesBtn.onclick) yesBtn.click();
            }
          });
        },30);
        // Restore inputs
        document.querySelectorAll('#contentArea .tds-input, #contentArea .zone-input').forEach((inp,i)=>{
          if(state[`inp_${i}`]!==undefined) inp.value = state[`inp_${i}`];
        });
        // Restore selects
        setTimeout(()=>{
          document.querySelectorAll('#contentArea .tds-select, #contentArea select').forEach((sel,i)=>{
            if(state[`sel_${i}`]!==undefined) sel.value = state[`sel_${i}`];
          });
        },80);

        if(state.rejReasons){rejReasons=JSON.parse(state.rejReasons);sessionStorage.setItem('rejReasons',JSON.stringify(rejReasons));}
        if(state.qcInstr){qcInstr=JSON.parse(state.qcInstr);sessionStorage.setItem('qcInstr',JSON.stringify(qcInstr));}
        setTimeout(()=>{if(typeof renderRejChips==='function')renderRejChips();if(typeof renderQcInstrChips==='function')renderQcInstrChips();},100);
      },50);
    }

        return `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:8px 14px;font-size:12px;">${r.courier}</td>
            <td style="padding:8px 14px;"><input class="tds-input" value="${r.days}" style="width:60px;text-align:center;" onchange="sbdOffsets[${i}].days=this.value"></td>
          </tr>`;
      }).join('');
    }
    function editOffset(i){renderSBDOffsets();}
    function saveOffset(i){renderSBDOffsets();}

    function renderSBDCutoffs(){
      const tbody=document.getElementById('sbdCutoffBody');if(!tbody)return;
      tbody.innerHTML=sbdCutoffs.map((r,i)=>{
        return `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:8px 12px;font-size:12px;">${r.courier}</td>
            <td style="padding:8px 12px;"><input class="tds-input" value="${r.p1}" style="width:50px;text-align:center;" onchange="sbdCutoffs[${i}].p1=this.value"></td>
            <td style="padding:8px 12px;"><input class="tds-input" value="${r.p2}" style="width:50px;text-align:center;" onchange="sbdCutoffs[${i}].p2=this.value"></td>
            <td style="padding:8px 12px;"><input class="tds-input" value="${r.p3}" style="width:50px;text-align:center;" onchange="sbdCutoffs[${i}].p3=this.value"></td>
            <td style="padding:8px 12px;"><input class="tds-input" value="${r.p4}" style="width:50px;text-align:center;" onchange="sbdCutoffs[${i}].p4=this.value"></td>
            <td style="padding:8px 12px;"><input class="tds-input" value="${r.p5}" style="width:50px;text-align:center;" onchange="sbdCutoffs[${i}].p5=this.value"></td>
          </tr>`;
      }).join('');
    }
    function editSBDOffsets(){renderSBDOffsets();}
    function editSBDCutoffs(){renderSBDCutoffs();}
    function saveCutoff(i){renderSBDCutoffs();}

    // Observer for zones table
    const _contentEl=document.getElementById('contentArea');
    if(_contentEl){const obs=new MutationObserver(()=>{if(document.getElementById('zonesBody'))renderZones();});obs.observe(_contentEl,{childList:true});}

    renderAll();
    setTimeout(restoreState, 100);

    // ===== Save as Draft =====
    let draftDirty = false;
    function saveDraft(){
      saveAllState();
      sessionStorage.setItem('fcSaved',JSON.stringify(saved));
      draftDirty = false;
      const btn = document.getElementById('btnSaveDraft');
      btn.disabled = true;
      // Show snackbar if exists
      const sb = document.createElement('div');
      sb.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#0D7A3F;color:white;padding:12px 24px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:500;';
      sb.innerHTML='<span class="material-icons-outlined" style="font-size:18px;">check_circle</span>Draft saved';
      document.body.appendChild(sb);
      setTimeout(()=>sb.remove(),3000);
    }
    function markDraftDirty(){
      draftDirty = true;
      const btn = document.getElementById('btnSaveDraft');
      if(btn) btn.disabled = false;
    }
    // Listen for any change to mark dirty
    document.addEventListener('click',function(e){
      if(e.target.classList.contains('seg-btn')||e.target.classList.contains('rej-opt')||e.target.classList.contains('day-pill')){
        markDraftDirty();
      }
    });
    document.addEventListener('input',function(e){
      if(e.target.classList.contains('tds-input')||e.target.classList.contains('tds-select')||e.target.tagName==='SELECT'){
        markDraftDirty();
      }
    });
  </script>
</body>
</html>
